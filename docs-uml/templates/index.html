<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vista interactiva de arquitectura UML — Nodos, capas, relaciones, filtros y búsqueda.">
    <title>Arquitectura UML Interactiva</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ============================================================ -->
    <!-- HEADER                                                        -->
    <!-- ============================================================ -->
    <header id="app-header">
        <div class="header-brand">
            <div class="header-logo">
                <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
                    <rect x="2" y="6" width="12" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
                    <rect x="18" y="6" width="12" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
                    <rect x="10" y="18" width="12" height="8" rx="2" stroke="currentColor" stroke-width="2"/>
                    <line x1="8" y1="14" x2="16" y2="18" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="24" y1="14" x2="16" y2="18" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </div>
            <div class="header-text">
                <h1 id="project-name">Arquitectura UML</h1>
                <span id="project-version" class="badge">v0.0.0</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="search-container" id="search-container">
                <svg class="search-icon" viewBox="0 0 20 20" width="16" height="16">
                    <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                    <line x1="13" y1="13" x2="18" y2="18" stroke="currentColor" stroke-width="2"/>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar nodos, capas, diagramas..." autocomplete="off">
                <kbd class="search-kbd">Ctrl+K</kbd>
            </div>
            <button id="btn-toggle-view" class="btn-icon" title="Alternar vista grafo / lista">
                <svg viewBox="0 0 20 20" width="18" height="18">
                    <circle cx="4" cy="4" r="2" fill="currentColor"/>
                    <circle cx="16" cy="4" r="2" fill="currentColor"/>
                    <circle cx="10" cy="16" r="2" fill="currentColor"/>
                    <line x1="4" y1="6" x2="10" y2="14" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="16" y1="6" x2="10" y2="14" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- MAIN LAYOUT                                                   -->
    <!-- ============================================================ -->
    <main id="app-main">
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <!-- Layer Filters -->
            <section class="sidebar-section" id="filter-section">
                <h2 class="sidebar-title">Capas</h2>
                <div id="layer-filters"></div>
            </section>

            <!-- Node Type Filters -->
            <section class="sidebar-section" id="type-filter-section">
                <h2 class="sidebar-title">Tipos</h2>
                <div id="type-filters"></div>
            </section>

            <!-- Stats -->
            <section class="sidebar-section" id="stats-section">
                <h2 class="sidebar-title">Resumen</h2>
                <div id="stats-content"></div>
            </section>

            <!-- Diagrams List -->
            <section class="sidebar-section" id="diagrams-section">
                <h2 class="sidebar-title">Diagramas</h2>
                <div id="diagrams-list"></div>
            </section>
        </aside>

        <!-- CONTENT AREA -->
        <div id="content-area">
            <!-- Graph View -->
            <div id="graph-view" class="view-panel active">
                <div id="graph-container"></div>
                <div id="graph-controls">
                    <button id="btn-zoom-in" class="btn-control" title="Acercar">+</button>
                    <button id="btn-zoom-out" class="btn-control" title="Alejar">−</button>
                    <button id="btn-fit" class="btn-control" title="Ajustar">⊞</button>
                    <button id="btn-reset" class="btn-control" title="Reiniciar filtros">↺</button>
                </div>
            </div>

            <!-- Diagram View -->
            <div id="diagram-view" class="view-panel">
                <div id="diagram-header">
                    <button id="btn-back-to-graph" class="btn-back">← Volver al grafo</button>
                    <h2 id="diagram-title"></h2>
                    <span id="diagram-type" class="badge"></span>
                </div>
                <div id="diagram-content"></div>
                <div id="diagram-meta"></div>
            </div>
        </div>

        <!-- DETAIL PANEL -->
        <aside id="detail-panel" class="hidden">
            <button id="btn-close-detail" class="btn-close" title="Cerrar">×</button>
            <div id="detail-content"></div>
        </aside>
    </main>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                       -->
    <!-- ============================================================ -->
    <script src="vendor/cytoscape.min.js"></script>
    <script src="js/manifest-loader.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
